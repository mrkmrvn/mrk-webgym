/* Белый фон страницы — видно вокруг фрейма */
html,body{
  width:100%;height:100%;
  background:#ffffff;
  overflow:hidden;
  cursor:none;
  font-family:'Space Mono',monospace;
}

/* ── CURSOR ── */
#cur{position:fixed;width:12px;height:12px;border-radius:50%;background:#fff;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .12s;}
#ring{position:fixed;width:45px;height:45px;border-radius:50%;border:1px solid rgb(255, 255, 255);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .18s,height .18s,border-color .18s}

/* ── FRAME AREA — всё внутри с отступом 14px ── */
/* Белый фон снаружи + скруглённый контейнер */
.page{
  position:fixed;
  top:14px;left:14px;right:14px;bottom:14px;
  border-radius:50px;
  overflow:hidden;
  /* Вырез справа снизу через clip-path — на самом контейнере */
}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  opacity:0;animation:fD .5s .05s both;
}
.logo-btn{
  width:44px;height:44px;cursor:pointer;flex-shrink:0;
  transition:transform .2s;
}
.logo-btn:hover{transform:scale(1.05)}
.coords{
  position: relative;
  padding-right: 20px;
  font-size:17px;letter-spacing:.07em;
  color:rgb(255, 255, 255);
  text-align:right;line-height:1.2;text-transform:uppercase;
}
.coords::after {
  position: absolute;
  content: '';
  width: 8px;
  height: 8px;
  background: #fff;
  right: 0;
  top: 5px;
}

/* ── INTRO ── */
.intro{
  font-size:16px;letter-spacing:.18em;
  color:rgba(255,255,255,1);
  text-transform:uppercase;
  margin-top:30px;
  opacity:0;animation:fU .4s .2s both;
}
.intro::before{content:'// ';color:rgba(255,255,255,1)}

/* ── HEADLINE ── */
.headline{
  margin-top:30px;
  font-family:'Space Grotesk',sans-serif;
  font-weight:300;
  font-size:clamp(50px,7.2vw,106px);
  line-height:.91;
  letter-spacing:-.025em;
  text-transform:uppercase;
  color:#fff;
}
.headline em{font-style:normal;font-weight:700}

/* ── SUBLINE ── */
.subline{
  margin-top:30px;
  font-size:clamp(16px,1.3vw,21px);
  letter-spacing:.1em;line-height:1.4;
  color:rgba(255,255,255,1);
  text-transform:uppercase;
  min-height:3em;
  font-weight: 200;
}

/* ── КНОПКИ — точно как в дизайне ── */
.links{
  display:flex;flex-direction:column;gap:11px;
  margin-top:3vw;
  opacity:0;animation:fU .4s 2.3s both;
}
.links-row{display:flex;gap:11px}

/* Базовая кнопка */
.btn{
  display:inline-flex;
  align-items:center;
  height:50px;
  border-radius:15px;
  background:rgba(255,255,255,0.82);
  border:none;
  cursor:pointer;
  text-decoration:none;
  overflow:hidden;
  transition: all 0.3s ease;
}

/* Текст кнопки */
.btn-label{
  font-family:'Space Mono',monospace;
  font-size:16px;font-weight:700;
  letter-spacing:.13em;text-transform:uppercase;
  color:#8a8098;
  padding:0 30px;
  white-space:nowrap;
}

/* Квадрат под иконку — справа внутри ссылки при hover */
.btn-icon{
  width:0;
  height:0px;
  background:#8C808E url("./images/Subtract.svg") no-repeat center / 25%;
  border-radius:14px;
  flex-shrink:0;
  margin-right:4px;
  transition: all 0.3s;
  opacity: 0;
}
.btn:hover .btn-icon{
  width:42px;
  height: 40px;
  margin-left:4px;
  opacity: 1;
}

/* ── SPACER ── */
.spacer{flex:1}

/* ── STATS — точно как в дизайне ── */
.stats{
  display:flex;gap:10px;
}

/* Карточки статистики — светло-серые с blur, как на скрине */
.stat{
  padding-left: 33px;
  display: flex;
  justify-content: center;
  flex-direction: column;
  border-radius:16px;
  /* Точный цвет из дизайна — светло-серый полупрозрачный */
  background:rgba(255, 255, 255, 0.2);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.30);
  position:relative;
  min-width: 155px;
  height: 155px;
  border-radius: 40px;
  transition: 0.3s ease;
}

.stat:hover {
  background:rgba(255, 255, 255, 0.8);
}

.stat:hover .stat-n{
  color: #505063;
}

.stat:hover .stat-l{
  color: rgba(0,0,0,.4);
}
.stat:hover::before{
  background: #FFE4C0;
}

.stat-content {
  display: flex;
  flex-direction: column;
}

/* Точка-индикатор сверху слева */
.stat::before{
  content:'';
  position:absolute;
  top:25px;left:33px;
  width:9px;height:9px;
  border-radius:50%;
  background:rgba(255,255,255,.55);
  transition: 0.3s ease;
}

.stat-n{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(24px,2.8vw,38px);
  font-weight:700;
  color:#fff;
  letter-spacing:-.03em;
  line-height:1;
  margin-top:8px;
  transition: 0.3s ease;
}
.stat-l{
  font-size:16px;
  color:rgba(255,255,255,.7);
  margin-top:5px;
  line-height:1.2;
  letter-spacing:.02em;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  transition: 0.3s ease;
}

/* ── ПРАВЫЕ ЛЕЙБЛЫ ── */
.rlabels{
  height: 60vh;
  position:absolute;
  right:60px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;justify-content: space-between;
  z-index:20;
  opacity:0;animation:fI .6s .8s both;
}
.rl{
  padding-right: 20px;
  position: relative;
  font-size:17px;letter-spacing:.15em;
  color:rgb(255, 255, 255);
  text-transform:uppercase;
  display:flex;align-items:center;gap:7px;justify-content:flex-end;
}

.rl::after {
  position: absolute;
  content: '';
  width: 8px;
  height: 8px;
  background: #fff;
  right: 0;
  top: 8px;
}

/* ── EXPERIENCE CARD — в вырезе справа снизу ── */
/* Карточка снаружи page, позиционирована на белом фоне */
.exp-card{
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  position:fixed;
  right:14px;bottom:14px;
  z-index:300;
  width: 369px;
  height: 164px;
  background: url("./images/Vector\ \(33\).svg");
}
.exp{
  display:flex;align-items:center;gap:14px;
  text-decoration:none;cursor:pointer;
  margin-bottom: 22px;margin-right: 60px;
}

.exp-logo{
  margin-right: 20px;
  width: 57px;
  height: 57px;
  border-radius: 50%;
  background: #D9D9D9 url("./images/Subtract\ \(1\).svg") no-repeat center;
  transition: 0.3s ease;
}

.exp:hover .exp-logo {
  transform: translate(5px, -5px);
}


.exp-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:19px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:#3a3545;
}
.exp-sub{
  font-size:14px;letter-spacing:.07em;
  color:#8a8098;margin-top:3px;
}

/* ── АНИМАЦИИ ── */
@keyframes fD{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cc{
  display:inline-block;width:2px;height:.82em;
  background:rgba(255,255,255,.9);
  margin-left:2px;vertical-align:text-bottom;
  animation:blink .55s infinite;
  transform: translateY(-7px);
}

</style>
</head>

<script>
// ── CURSOR ──
const cur=document.getElementById('cur'),ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function loop(){
  cur.style.left=mx+'px';cur.style.top=my+'px';
  rx+=(mx-rx)*.1;ry+=(my-ry)*.1;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(loop);
})();
document.querySelectorAll('a,.logo-btn').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    cur.style.transform='translate(-50%,-50%) scale(2.4)';
    ring.style.width='44px';ring.style.height='44px';
    ring.style.borderColor='rgba(138,128,152,.7)';
  });
  el.addEventListener('mouseleave',()=>{
    cur.style.transform='translate(-50%,-50%) scale(1)';
    ring.style.width='30px';ring.style.height='30px';
    ring.style.borderColor='rgba(138,128,152,.5)';
  });
});

// ── TYPEWRITER ──
function type(el,txt,spd,cb){
  let i=0;
  const c=document.createElement('span');c.className='cc';el.appendChild(c);
  (function t(){
    if(i<txt.length){c.before(document.createTextNode(txt[i++]));setTimeout(t,spd+Math.random()*spd*.3)}
    else if(cb){c.remove();cb()}
  })();
}
setTimeout(()=>{
  type(document.getElementById('hl1'),'I Design',50,()=>{
    setTimeout(()=>{
      type(document.getElementById('hl1b'),'Digital',50,()=>{
        setTimeout(()=>{
          type(document.getElementById('hl2'),'Systems',58,()=>{
            setTimeout(()=>{
              type(document.getElementById('sl'),'That are functional,',40,()=>{
                document.getElementById('sl').appendChild(document.createElement('br'));
                setTimeout(()=>type(document.getElementById('sl'),'intuitive and impactful',40,null),100);
              });
            },180);
          });
        },140);
      });
    },140);
  });
},420);

// ── COUNTERS ──
document.querySelectorAll('.stat-n').forEach(el=>{
  const v=+el.dataset.val,d=1100,s=performance.now();
  (function f(t){
    const p=Math.min((t-s)/d,1),e=1-Math.pow(1-p,3);
    el.textContent=Math.floor(e*v)+'+';
    if(p<1)requestAnimationFrame(f);
    else el.textContent=v+'+';
  })(s);
});
</script>
