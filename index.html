<head>

<title>VEYMEST — I Design Digital Systems</title>
<link rel="icon" href="./images/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* Белый фон страницы — видно вокруг фрейма */
html,body{
  width:100%;height:100%;
  background:#ffffff;
  overflow:hidden;
  cursor:none;
  font-family:'Space Mono',monospace;
}


/* ── LOADER ── */
#loader{
  position:fixed;inset:0;z-index:10000;
  display:flex;align-items:center;justify-content:center;
  background:#fff;
  transition:opacity .75s ease,visibility .75s ease;
}
#loader.is-done{opacity:0;visibility:hidden;pointer-events:none}
.loader-inner{
  display:flex;flex-direction:column;align-items:center;gap:28px;
  width:min(280px,72vw);
}
.loader-mark::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.85) 50%,transparent 60%);
  animation:loaderShine 1.4s ease-in-out infinite;
}
.loader-track{
  width:100%;height:2px;border-radius:2px;
  background:rgba(177,176,176,.22);overflow:hidden;
}
.loader-fill{
  display:block;height:100%;width:0;border-radius:2px;
  background:#b1b0b0;
  transition:width .35s ease;
}
@keyframes loaderShine{
  0%{transform:translateX(-120%)}
  100%{transform:translateX(120%)}
}

body.is-loading .topbar,
body.is-loading .intro,
body.is-loading .links,
body.is-loading .rlabels{animation:none!important;opacity:0}
body.is-loading #cur,
body.is-loading #ring{opacity:0}

/* ── CURSOR ── */
#cur{position:fixed;width:12px;height:12px;border-radius:50%;background:#fff;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .12s,opacity .4s;}
#ring{position:fixed;width:45px;height:45px;border-radius:50%;border:1px solid rgb(255, 255, 255);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .18s,height .18s,border-color .18s,opacity .4s}

/* ── FRAME AREA — всё внутри с отступом 14px ── */
/* Белый фон снаружи + скруглённый контейнер */
.page{
  position:fixed;
  top:14px;left:14px;right:14px;bottom:14px;
  border-radius:50px;
  overflow:hidden;
  /* Вырез справа снизу через clip-path — на самом контейнере */
}


.video-bg {
  background: #fff;
  width: 100%;
  height: 100%;
}

.video-bg video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
/* ── SHELL — основной контент ── */
.shell{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding: 60px;
  z-index:10;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  opacity:0;
}
body.loaded .topbar{animation:fD .5s .05s both}
.logo-btn{
  width:44px;height:44px;cursor:pointer;flex-shrink:0;
  transition:transform .2s;
}
.logo-btn:hover{transform:scale(1.05)}
.coords{
  position: relative;
  padding-right: 20px;
  font-size:17px;letter-spacing:.07em;
  color:rgb(255, 255, 255);
  text-align:right;line-height:1.2;text-transform:uppercase;
}
.coords::after {
  position: absolute;
  content: '';
  width: 8px;
  height: 8px;
  background: #fff;
  right: 0;
  top: 5px;
}

/* ── INTRO ── */
.intro{
  font-size:16px;letter-spacing:.18em;
  color:rgba(255,255,255,1);
  text-transform:uppercase;
  margin-top:30px;
  opacity:0;
}
body.loaded .intro{animation:fU .4s .2s both}
.intro::before{content:'// ';color:rgba(255,255,255,1)}

/* ── HEADLINE ── */
.headline{
  margin-top:30px;
  font-family:'Space Grotesk',sans-serif;
  font-weight:300;
  font-size:clamp(50px,7.2vw,106px);
  line-height:.91;
  letter-spacing:-.025em;
  text-transform:uppercase;
  color:#fff;
}
.headline em{font-style:normal;font-weight:700}

/* ── SUBLINE ── */
.subline{
  margin-top:30px;
  font-size:clamp(16px,1.3vw,21px);
  letter-spacing:.1em;line-height:1.4;
  color:rgba(255,255,255,1);
  text-transform:uppercase;
  min-height:3em;
  font-weight: 200;
}

/* ── КНОПКИ — точно как в дизайне ── */
.links{
  display:flex;flex-direction:column;gap:7px;
  margin-top:3vw;
  opacity:0;
}
body.loaded .links{animation:fU .4s 2.3s both}
.links-row{display:flex;gap:7px}

/* Базовая кнопка */
.btn{
  display:inline-flex;
  align-items:center;
  height:50px;
  border-radius:17px;
  background:rgba(255,255,255,0.82);
  border:none;
  cursor:pointer;
  text-decoration:none;
  overflow:hidden;
  transition: all 0.3s ease;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

/* Текст кнопки */
.btn-label{
  font-family:'Space Mono',monospace;
  font-size:16px;font-weight:700;
  letter-spacing:.13em;text-transform:uppercase;
  color:#a9acb4;
  padding:0 30px;
  white-space:nowrap;
}

/* Квадрат под иконку — справа внутри ссылки при hover */
.btn-icon{
  width:0;
  height:0px;
  background:#a9acb4 url("./images/Subtract.svg") no-repeat center / 25%;
  border-radius:14px;
  flex-shrink:0;
  margin-right:5px;
  transition: all 0.3s;
  opacity: 0;
}
.btn:hover .btn-icon{
  width:42px;
  height: 40px;
  margin-left:4px;
  opacity: 1;
}

/* ── SPACER ── */
.spacer{flex:1}

/* ── STATS — точно как в дизайне ── */
.stats{
  display:flex;gap:10px;
}

/* Карточки статистики — светло-серые с blur, как на скрине */
.stat{
  padding-left: 33px;
  display: flex;
  justify-content: center;
  flex-direction: column;
  border-radius:16px;
  /* Точный цвет из дизайна — светло-серый полупрозрачный */
  background:rgba(255, 255, 255, 0.2);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.30);
  position:relative;
  width: 155px;
  height: 155px;
  border-radius: 40px;
  transition: 0.3s ease;
}

.stat:hover {
  background:rgba(255, 255, 255, 0.8);
}

.stat:hover .stat-n{
  color: #505063;
}

.stat:hover .stat-l{
  color: rgba(0,0,0,.4);
}
.stat:hover::before{
  background: #FFE4C0;
}

.stat-content {
  display: flex;
  flex-direction: column;
  margin-top: 20px;
}

/* Точка-индикатор сверху слева */
.stat::before{
  content:'';
  position:absolute;
  top:25px;left:33px;
  width:9px;height:9px;
  border-radius:50%;
  background:rgba(255,255,255,.55);
  transition: 0.3s ease;
}

.stat-n{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(24px,2.8vw,38px);
  font-weight:700;
  color:#fff;
  letter-spacing:-.03em;
  line-height:1;
  margin-top:8px;
  transition: 0.3s ease;
}
.stat-l{
  font-size:16px;
  color:rgba(255,255,255,.7);
  margin-top:5px;
  line-height:1.2;
  letter-spacing:.02em;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  transition: 0.3s ease;
}

/* ── ПРАВЫЕ ЛЕЙБЛЫ ── */
.rlabels{
  height: 60vh;
  position:absolute;
  right:60px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;justify-content: space-between;
  z-index:20;
  opacity:0;
}
body.loaded .rlabels{animation:fI .6s .8s both}
.rl{
  padding-right: 20px;
  position: relative;
  font-size:17px;letter-spacing:.15em;
  color:rgb(255, 255, 255);
  text-transform:uppercase;
  display:flex;align-items:center;gap:7px;justify-content:flex-end;
}

.rl::after {
  position: absolute;
  content: '';
  width: 8px;
  height: 8px;
  background: #fff;
  right: 0;
  top: 8px;
}

/* ── EXPERIENCE CARD — в вырезе справа снизу ── */
/* Карточка снаружи page, позиционирована на белом фоне */
.exp-card{
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  position:fixed;
  right:14px;bottom:14px;
  z-index:300;
  width: 369px;
  height: 164px;
  background: url("./images/Vector\ \(33\).svg");
}
.exp{
  display:flex;align-items:center;gap:14px;
  text-decoration:none;cursor:pointer;
  margin-bottom: 22px;margin-right: 70px;
}

.exp-logo{
  margin-right: 20px;
  width: 57px;
  height: 57px;
  border-radius: 50%;
  background: #D9D9D9 url("./images/Subtract\ \(1\).svg") no-repeat center;
  transition: 0.3s ease;
}

.exp:hover .exp-logo {
  transform: translate(5px, -5px);
}


.exp-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:19px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:#3a3545;
}
.exp-sub{
  font-size:14px;letter-spacing:.07em;
  color:#8a8098;margin-top:3px;
}

/* ── АНИМАЦИИ ── */
@keyframes fD{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cc{
  display:inline-block;width:2px;height:.82em;
  background:rgba(255,255,255,.9);
  margin-left:2px;vertical-align:text-bottom;
  animation:blink .55s infinite;
  transform: translateY(-7px);
}


@media (min-width:3200px) { 
  .video-bg video {
    object-position: center 70%;
  }
}

@media (max-width:960px) {
  .rlabels {
    height: 40vh;
  }
}

/* ===== MOBILE FIX v2 ===== */
@media (max-width:768px){

html,body{
  overflow:auto;
  cursor:auto;
}

#cur,#ring{display:none;}

/* не масштабируем page */
.page{
  top:8px;
  left:8px;
  right:8px;
  bottom:8px;
  border-radius:32px;
}

/* уменьшаем весь контент внутри как делает Safari */
.shell{
  zoom:.78;
  transform-origin:top center;
}

.exp-card{
  zoom:.78;
}

}


@media (max-width:768px){

/* уменьшение боковых подписей */
.pos,
.coords,
.coord,
.meta,
.future,
.axis,
[class*="future"],
[class*="axis"],
[class*="coord"]{
  font-size:11px !important;
  letter-spacing:.12em !important;
}

/* карточки 2x2 */
.stats-wrap,
.cards{
  display:grid !important;
  grid-template-columns:1fr 1fr !important;
  gap:14px !important;
}

.stat-card,
.card{
  width:auto !important;
  min-width:0 !important;
}

/* experience чуть компактнее */
.experience-card{
  transform:scale(.85);
  transform-origin:bottom right;
}
}


@media (max-width:768px){

/* уменьшить все правые подписи */
.rlabels{
  right:28px !important;
}

.rl{
  font-size:12px !important;
  letter-spacing:.08em !important;
}

.coords{
  font-size:11px !important;
}

/* квадратные карточки */
.stats{
  margin-top: 30px;
  display: grid;
  /* Ровно 2 колонки, каждая по размеру своего содержимого */
  grid-template-columns: repeat(2, auto); 
  
  /* Прижимает всю сетку к левому краю (чтобы она не тянулась на всю ширину) */
  justify-content: start;
}

.stat .num{
  font-size:28px !important;
}

}


@media (max-width:768px){

/* все боковые подписи одного размера */
.rl,
.coords{
    font-size:12px !important;
    letter-spacing:.12em !important;
}

.stats{
    gap:12px !important;
}

.btn {
  overflow: visible;
}

}



@media (max-width:768px){

/* нормальная адаптация без zoom */
.shell{
  zoom:1 !important;
  transform:none !important;
  width:100% !important;
  padding:24px !important;
  overflow: auto;
}

/* скрыть правые подписи */
.rlabels{
  display:none !important;
}

/* оставить только POS X / POS Y */
.coords{
  font-size:11px !important;
  line-height:1.4 !important;
}

/* заголовок */
.headline{
  font-size:56px !important;
  line-height:.92 !important;
}

/* подзаголовок */
.subline{
  margin-top: 0;
  font-size:clamp(14px, 4.5vw, 16px) !important;
  line-height:1.35 !important;
}

/* кнопки */
.links{
  justify-content: flex-start;
  align-items: flex-start;
}

.link,
.btn{
  font-size:14px !important;
}


.stat .num{
  font-size:26px !important;
}

.exp-card{
  zoom:1 !important;
}

.shell {
  padding-bottom: 117px !important;
}

}


@media (max-width:768px){

.page{
  top:16px!important;left:16px!important;right:16px!important;bottom:16px!important;
  border-radius:34px!important;
}

.hero-title,
h1{
  transform:scale(.82)!important;
  transform-origin:left top!important;
}

.hero-subtitle,
.intro,
.lead{
  font-size:.82em!important;
  line-height:1.35!important;
}

.btn,.button,.link-card{
  transform-origin:center center!important;
}
.links {
  gap: 7px;
}

.btn-label {
  font-size: 13px;
}

.exp-card,
.experience-card{
  transform:scale(.78)!important;
  transform-origin:bottom center!important;
}

.stats-card,
.metric-card{
  transform:scale(.85)!important;
  transform-origin:center center!important;
}

.card{
  padding:18px!important;
}

body{
  zoom:.92;
}

.exp-card {
  right: -25px;
}
}

</style>

<script>
(function(){
  const loader=document.getElementById('loader');
  const fill=document.getElementById('loaderFill');
  const video=document.querySelector('.video-bg video');
  const FADE_MS=750;
  const MIN_MS=700;
  const t0=performance.now();
  let pageReady=false,videoReady=!video,done=false;

  function setProgress(p){
    fill.style.width=Math.min(p,100)+'%';
  }

  function tickProgress(){
    if(pageReady&&videoReady)return;
    const base=document.readyState==='complete'?55:document.readyState==='interactive'?30:12;
    const vid=video&&video.buffered.length?Math.min(video.buffered.end(0)/Math.max(video.duration||1,1)*40,40):0;
    setProgress(base+vid);
    if(!pageReady||!videoReady)requestAnimationFrame(tickProgress);
  }
  tickProgress();

  function markPageReady(){
    pageReady=true;
    setProgress(85);
    whenReady();
  }

  function markVideoReady(){
    videoReady=true;
    setProgress(100);
    whenReady();
  }

  function finishLoader(){
    if(done)return;
    done=true;
    const wait=Math.max(0,MIN_MS-(performance.now()-t0));
    setTimeout(()=>{
      setProgress(100);
      requestAnimationFrame(()=>{
        loader.classList.add('is-done');
        setTimeout(()=>{
          loader.remove();
          document.body.classList.remove('is-loading');
          document.body.classList.add('loaded');
          startAnimations();
        },FADE_MS);
      });
    },wait);
  }

  function whenReady(){
    if(pageReady&&videoReady)finishLoader();
  }

  if(document.readyState==='complete')markPageReady();
  else window.addEventListener('load',markPageReady,{once:true});

  if(video){
    if(video.readyState>=3)markVideoReady();
    else{
      video.addEventListener('canplaythrough',markVideoReady,{once:true});
      video.addEventListener('error',markVideoReady,{once:true});
    }
  }

  function startAnimations(){
    initCursor();
    initTypewriter();
    initCounters();
  }

  function initCursor(){
    const cur=document.getElementById('cur'),ring=document.getElementById('ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
    cur.style.opacity=ring.style.opacity='1';
    (function loop(){
      cur.style.left=mx+'px';cur.style.top=my+'px';
      rx+=(mx-rx)*.1;ry+=(my-ry)*.1;
      ring.style.left=rx+'px';ring.style.top=ry+'px';
      requestAnimationFrame(loop);
    })();
  }

  function type(el,txt,spd,cb){
    let i=0;
    const c=document.createElement('span');c.className='cc';el.appendChild(c);
    (function t(){
      if(i<txt.length){c.before(document.createTextNode(txt[i++]));setTimeout(t,spd+Math.random()*spd*.3)}
      else if(cb){c.remove();cb()}
    })();
  }

  function initTypewriter(){
    setTimeout(()=>{
      type(document.getElementById('hl1'),'I Design',50,()=>{
        setTimeout(()=>{
          type(document.getElementById('hl1b'),'Digital',50,()=>{
            setTimeout(()=>{
              type(document.getElementById('hl2'),'Systems',58,()=>{
                setTimeout(()=>{
                  type(document.getElementById('sl'),'That are functional,',40,()=>{
                    document.getElementById('sl').appendChild(document.createElement('br'));
                    setTimeout(()=>type(document.getElementById('sl'),'intuitive and impactful',40,null),100);
                  });
                },180);
              });
            },140);
          });
        },140);
      });
    },420);
  }

  function initCounters(){
    document.querySelectorAll('.stat-n').forEach(el=>{
      const v=+el.dataset.val,d=1100,s=performance.now();
      (function f(t){
        const p=Math.min((t-s)/d,1),e=1-Math.pow(1-p,3);
        el.textContent=Math.floor(e*v)+'+';
        if(p<1)requestAnimationFrame(f);
        else el.textContent=v+'+';
      })(s);
    });
  }
})();
</script>
